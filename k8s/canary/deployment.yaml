# v1 Deployment - 기존 버전
apiVersion: apps/v1
kind: Deployment
metadata:
    name: sk3024-maintq-fe-v1
    namespace: skala3-ai1
spec:
    replicas: 2 # v1은 메인 버전이므로 2개
    selector:
        matchLabels:
            app: sk3024-maintq-fe
            version: v1 # Service가 이 라벨로 v1 Pod만 선택
    template:
        metadata:
            labels:
                app: sk3024-maintq-fe
                version: v1 # Pod에 version 라벨 부착
        spec:
            imagePullSecrets:
                - name: harbor-pull-secret
            containers:
                - name: sk3024-maintq-fe
                  image: amdp-registry.skala-ai.com/skala26a-ai1/a3024:623480d
                  ports:
                      - containerPort: 8001
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '500m'
                          memory: '512Mi'
                  # PVC 마운트 없음 - ReadWriteOnce PVC는 동시에 여러 노드 마운트 불가
---
# v2 Deployment - 카나리 버전 (새 버전 테스트)
apiVersion: apps/v1
kind: Deployment
metadata:
    name: sk3024-maintq-fe-v2
    namespace: skala3-ai1
spec:
    replicas: 1 # v2는 소량 트래픽 테스트용이므로 1개
    selector:
        matchLabels:
            app: sk3024-maintq-fe
            version: v2 # Service가 이 라벨로 v2 Pod만 선택
    template:
        metadata:
            labels:
                app: sk3024-maintq-fe
                version: v2 # Pod에 version 라벨 부착
        spec:
            imagePullSecrets:
                - name: harbor-pull-secret
            containers:
                - name: sk3024-maintq-fe
                  # 실습에서는 같은 이미지 사용 (실제로는 새 버전 이미지)
                  image: amdp-registry.skala-ai.com/skala26a-ai1/a3024:623480d
                  ports:
                      - containerPort: 8001
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '500m'
                          memory: '512Mi'
                  # PVC 마운트 없음 - ReadWriteOnce PVC는 동시에 여러 노드 마운트 불가
