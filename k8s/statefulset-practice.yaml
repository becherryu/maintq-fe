# 4일차 실습 #1 - StatefulSet + Headless Service
# StatefulSet은 각 Pod에 고정 DNS를 부여
#   DNS 형식: <pod-name>.<service-name>.<namespace>.svc.cluster.local
#   예) sk3024-web-0.sk3024-web-headless.skala3-ai1.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
    name: sk3024-web-headless
    namespace: skala3-ai1
    labels:
        app: sk3024-web
spec:
    clusterIP: None # Headless: IP 할당 없이 DNS로 Pod IP 직접 노출
    selector:
        app: sk3024-web # sk3024-maintq-fe (blue-green)와 충돌 방지
    ports:
        - name: http
          port: 8001
          targetPort: 8001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: sk3024-web
    namespace: skala3-ai1
    labels:
        app: sk3024-web
spec:
    serviceName: sk3024-web-headless # 연결된 Headless Service → Pod DNS 생성 기준
    replicas: 3
    podManagementPolicy: OrderedReady # Pod 순서대로 생성/삭제 (0 → 1 → 2)
    selector:
        matchLabels:
            app: sk3024-web
    template:
        metadata:
            labels:
                app: sk3024-web
        spec:
            terminationGracePeriodSeconds: 10
            imagePullSecrets:
                - name: harbor-pull-secret
            containers:
                - name: sk3024-maintq-fe
                  image: amdp-registry.skala-ai.com/skala26a-ai1/a3024:ac6645c
                  ports:
                      - containerPort: 8001
                        name: http
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '500m'
                          memory: '512Mi'
                  volumeMounts:
                      - name: sk3024-web-data
                        mountPath: /data
    # Pod마다 별도 PVC 자동 생성
    # 생성되는 PVC명: sk3024-web-data-sk3024-web-0 / -1 / -2
    volumeClaimTemplates:
        - metadata:
              name: sk3024-web-data
              labels:
                  app: sk3024-web
          spec:
              accessModes:
                  - ReadWriteOnce # 한 노드에서만 마운트 (Pod 전용 볼륨)
              storageClassName: gp3
              resources:
                  requests:
                      storage: 1Gi
