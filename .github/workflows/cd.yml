name: CD - Deploy to Kubernetes

on:
    workflow_run:
        workflows: ['CI - Build & Push FE Docker Image']
        types:
            - completed
        branches:
            - main

env:
    HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
    IMAGE_NAME: a3024

jobs:
    deploy:
        name: Update image tag in k8s manifest
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        permissions:
            contents: write  # git push 권한 허용

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: main

            - name: Compute image tag
              id: meta
              run: |
                  SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
                  echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "full_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

            - name: Update image tag in deployment.yaml
              run: |
                  sed -i "s|image: .*/a3024:.*|image: ${{ steps.meta.outputs.full_image }}|" k8s/deployment.yaml

            - name: Commit and push updated manifest
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add k8s/deployment.yaml
                  git diff --cached --quiet || git commit -m "chore: update image tag to ${{ steps.meta.outputs.image_tag }}"
                  git push origin main
