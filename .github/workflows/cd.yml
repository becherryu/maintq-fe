name: CD - Deploy to Kubernetes

on:
    workflow_run:
        workflows: ["CI - Build & Push FE Docker Image"]
        types:
            - completed
        branches:
            - main

env:
    HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
    HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
    IMAGE_NAME: A3024
    DEPLOYMENT_NAME: sk3024-maintq-fe
    CONTAINER_NAME: sk3024-maintq-fe
    NAMESPACE: skala3-ai1

jobs:
    deploy:
        name: Deploy to Kubernetes
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        steps:
            - name: Set up kubectl
              uses: azure/setup-kubectl@v4

            - name: Configure kubeconfig
              run: |
                  mkdir -p ~/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

            - name: Get short SHA
              id: sha
              run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            - name: Deploy new image
              run: |
                  kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
                    ${{ env.CONTAINER_NAME }}=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }} \
                    -n ${{ env.NAMESPACE }}

            - name: Wait for rollout
              run: |
                  kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
                    -n ${{ env.NAMESPACE }} \
                    --timeout=120s
